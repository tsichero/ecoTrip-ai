<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoTrip AI</title>

  <link rel="stylesheet" href="CSS/style.css">
</head>

<body>

<main>
  <section class="card">
    <h2>EcoTrip AI 🌍</h2>

    <input id="destination" type="text" placeholder="Digite o destino">

    <select id="type">
      <option value="eco">Sustentável</option>
      <option value="luxo">Luxo</option>
      <option value="aventura">Aventura</option>
    </select>

    <button onclick="generateTrip()">Gerar sugestão</button>

    <div id="result"></div>
  </section>
</main>

<script src="js/app.js"></script>

</body>
</html>
